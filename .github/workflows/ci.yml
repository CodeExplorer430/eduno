name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  php:
    name: PHP Quality & Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: eduno_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.4', extensions: 'pgsql, pdo_pgsql, redis', coverage: none }
      - name: Configure environment
        run: |
          printf '%s\n' \
            'APP_NAME=Eduno' \
            'APP_ENV=testing' \
            'APP_KEY=' \
            'APP_DEBUG=true' \
            'APP_URL=http://localhost' \
            'DB_CONNECTION=pgsql' \
            'DB_HOST=127.0.0.1' \
            'DB_PORT=5432' \
            'DB_DATABASE=eduno_test' \
            'DB_USERNAME=postgres' \
            'DB_PASSWORD=postgres' \
            'REDIS_HOST=127.0.0.1' \
            'REDIS_PASSWORD=null' \
            'REDIS_PORT=6379' \
            'REDIS_CLIENT=phpredis' \
            'CACHE_STORE=array' \
            'SESSION_DRIVER=array' \
            'QUEUE_CONNECTION=sync' \
            'MAIL_MAILER=log' \
            > .env
      - run: composer install --no-interaction --prefer-dist --no-scripts
        env:
          COMPOSER_MEMORY_LIMIT: -1
      - run: mkdir -p bootstrap/cache storage/logs storage/framework/{sessions,views,cache}
      - run: php artisan key:generate
      - run: composer run-script post-autoload-dump
      - run: php artisan migrate --force
      - run: ./vendor/bin/pint --test
      - run: ./vendor/bin/phpstan analyse --level=5
      - run: php artisan test

  node:
    name: Node Quality & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci --legacy-peer-deps
      - run: npm run type-check
      - run: npm run lint
      - run: npm run format -- --check
      - run: npm run build
      - run: npm run test
